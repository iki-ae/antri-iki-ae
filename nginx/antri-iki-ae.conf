# Antri-Iki-Ae — Nginx vhost template
#
# STANDALONE INSTALL (install.sh)
#   install.sh substitutes ANTRI_DOMAIN and ANTRI_PORT automatically.
#   Do not edit this file for standalone installs — set env vars instead:
#     ANTRI_DOMAIN=antri.example.com sudo ./install.sh
#
# CLOUDPANEL
#   Do NOT place this file on a CloudPanel server. CloudPanel manages Nginx
#   through its own UI. Instead:
#     1. Create a Node.js site in CloudPanel (domain/subdomain)
#     2. In CloudPanel > Vhost editor, add these two lines inside the
#        existing `location /` block:
#
#            proxy_read_timeout  3600s;
#            proxy_buffering     off;
#
#     3. Run install.sh with --skip-nginx
#
# MANUAL INSTALL
#   Copy to /etc/nginx/sites-available/antri-iki-ae, replace the
#   placeholders, then symlink and reload:
#
#     DOMAIN=antri.example.com
#     PORT=3001
#     sed "s/\${ANTRI_DOMAIN}/$DOMAIN/g; s/\${ANTRI_PORT}/$PORT/g" \
#         nginx/antri-iki-ae.conf \
#         > /etc/nginx/sites-available/antri-iki-ae
#     ln -sf /etc/nginx/sites-available/antri-iki-ae \
#            /etc/nginx/sites-enabled/antri-iki-ae
#     nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name ${ANTRI_DOMAIN};

    client_max_body_size 64M;

    location / {
        proxy_pass         http://127.0.0.1:${ANTRI_PORT};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE — disable buffering and extend timeout for persistent connections
        proxy_read_timeout   3600s;
        proxy_buffering      off;
        proxy_cache          off;
    }
}
